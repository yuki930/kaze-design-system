name: Publish to NPM

on:
  push:
    branches: [main]
    # Only trigger when files that are actually shipped to npm change.
    # Docs, app shell, public assets, scripts, and CI config never ship,
    # so they must not cause a version bump / publish.
    paths:
      - 'src/components/**'
      - 'src/hooks/**'
      - 'src/lib/**'
      - 'src/utils/**'
      - 'src/tokens/**'
      - 'src/index.ts'
      - 'src/hooks.ts'
      - 'tokens.css'
      - 'reset.css'
      - 'components.css'
      - 'utilities.css'
      - 'kaze.css'
      - 'vite.config.lib.ts'
      - 'tsconfig.build.json'
      # Test/story files never ship in dist (only dist + root CSS are in
      # the package's `files` field), so they must not trigger a
      # release even though they live under src/components.
      - '!src/components/**/*.stories.tsx'
      - '!src/components/**/*.test.tsx'
      - '!src/components/**/*.test.ts'
      - '!src/hooks/**/*.stories.tsx'
      - '!src/hooks/**/*.test.tsx'
      - '!src/hooks/**/*.test.ts'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip runs created by the release bot itself (defense in depth —
    # GITHUB_TOKEN pushes should not re-trigger workflows, but we guard anyway).
    if: "!startsWith(github.event.head_commit.message, 'release:')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Determine semver bump from conventional commits
        id: bump
        run: |
          # Find the last release tag (format: vX.Y.Z). If none, fall back
          # to the repo's initial commit.
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            RANGE=""
            echo "No prior tag found — inspecting full history."
          else
            RANGE="${LAST_TAG}..HEAD"
            echo "Inspecting commits in ${RANGE}"
          fi

          COMMITS=$(git log $RANGE --pretty=format:'%s%n%b%n---' 2>/dev/null || git log --pretty=format:'%s%n%b%n---')

          BUMP="patch"
          if echo "$COMMITS" | grep -qE '^(BREAKING CHANGE:|feat!:|fix!:|refactor!:)'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Selected bump: $BUMP"

      - name: Generate CHANGELOG entry
        id: changelog
        run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            RANGE=""
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Collect commits, grouped by type.
          FEATURES=$(git log $RANGE --pretty=format:'- %s' --grep='^feat' || true)
          FIXES=$(git log $RANGE --pretty=format:'- %s' --grep='^fix' || true)
          OTHER=$(git log $RANGE --pretty=format:'- %s' --grep='^\(perf\|refactor\|docs\|chore\|build\|ci\)' || true)

          {
            echo 'entry<<EOF'
            if [ -n "$FEATURES" ]; then
              echo '### Features'
              echo
              echo "$FEATURES"
              echo
            fi
            if [ -n "$FIXES" ]; then
              echo '### Bug Fixes'
              echo
              echo "$FIXES"
              echo
            fi
            if [ -n "$OTHER" ]; then
              echo '### Other'
              echo
              echo "$OTHER"
              echo
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Bump version and update CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +%Y-%m-%d)

          # Prepend a new CHANGELOG section. Create the file if missing.
          if [ ! -f CHANGELOG.md ]; then
            printf '# Changelog\n\nAll notable changes to this project are documented here.\nThis project follows [Conventional Commits](https://www.conventionalcommits.org/) for semver bumps.\n\n' > CHANGELOG.md
          fi

          # Split header (everything before first "## [" entry) from the rest.
          HEADER=$(awk '/^## \[/ {exit} {print}' CHANGELOG.md)
          REST=$(awk 'f {print} /^## \[/ {f=1; print}' CHANGELOG.md)

          {
            printf '%s\n' "$HEADER"
            printf '## [%s] - %s\n\n' "$VERSION" "$DATE"
            printf '%s' "${{ steps.changelog.outputs.entry }}"
            printf '\n'
            printf '%s\n' "$REST"
          } > CHANGELOG.md

          git add package.json package-lock.json CHANGELOG.md
          git commit -m "release: v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Build library
        run: npm run build:lib

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
