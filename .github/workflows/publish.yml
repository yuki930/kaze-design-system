name: Publish to NPM

on:
  push:
    branches: [main]
    # Only trigger when files that are actually shipped to npm change.
    # Docs, app shell, public assets, scripts, and CI config never ship,
    # so they must not cause a version bump / publish.
    paths:
      - 'src/components/**'
      - 'src/hooks/**'
      - 'src/lib/**'
      - 'src/utils/**'
      - 'src/tokens/**'
      - 'src/index.ts'
      - 'src/hooks.ts'
      - 'tokens.css'
      - 'reset.css'
      - 'components.css'
      - 'utilities.css'
      - 'kaze.css'
      - 'vite.config.lib.ts'
      - 'tsconfig.build.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip runs created by the release bot itself (defense in depth —
    # GITHUB_TOKEN pushes should not re-trigger workflows, but we guard anyway).
    if: "!startsWith(github.event.head_commit.message, 'release:')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "release: v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Build library
        run: npm run build:lib

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
